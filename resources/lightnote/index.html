<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightNote</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="app-header">
    <span class="app-name">LightNote</span>
    <div class="header-actions">
      <button id="btn-search-toggle" class="icon-btn" title="AI Assistant (Ctrl+F)">🤖 AI</button>
      <button id="btn-settings" class="icon-btn" title="설정">⚙</button>
    </div>
  </header>

  <!-- 메인 레이아웃 -->
  <div class="main-layout">

    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <span class="sidebar-label">노트북</span>
        <button class="icon-btn-sm" id="btn-new-notebook" title="새 노트북">+</button>
      </div>
      <div class="notebook-tree" id="notebook-tree">
        <div class="empty-hint">노트북이 없습니다.<br>+ 버튼으로 만들어보세요.</div>
      </div>
    </aside>

    <!-- 에디터 영역 -->
    <main class="editor-area" id="editor-area">
      <div class="editor-header" id="editor-header" style="display:none">
        <input type="text" id="page-title" class="page-title-input" placeholder="제목 없음" maxlength="100">
        <div class="editor-header-right">
          <button id="btn-schedule" class="schedule-btn" title="이 노트를 AIScheduler 일정으로 등록합니다">&#128197; 일정 등록</button>
          <button id="btn-organize" class="organize-btn" title="AI가 내용을 체계적으로 정리합니다">&#10024; AI 정리</button>
          <span class="save-indicator" id="save-indicator">저장됨</span>
        </div>
      </div>
      <div id="quill-wrapper" style="display:none">
        <div id="quill-editor"></div>
      </div>
      <div class="editor-empty" id="editor-empty">
        <div class="editor-empty-content">
          <div class="editor-empty-icon">📝</div>
          <p>왼쪽에서 페이지를 선택하거나<br>새로 만들어보세요.</p>
        </div>
      </div>
    </main>

    <!-- 패널 리사이즈 핸들 -->
    <div class="panel-resize-handle" id="panel-resize-handle" style="display:none"></div>

    <!-- AI Assistant 패널 -->
    <aside class="search-panel" id="search-panel" style="display:none">
      <div class="search-panel-header">
        <span>🤖 AI Assistant</span>
        <button class="icon-btn-sm" id="btn-search-close" title="닫기">✕</button>
      </div>
      <div class="search-input-area">
        <textarea id="search-input" placeholder="노트에 대해 질문하거나 정리를 요청해보세요..." rows="3"></textarea>
        <div class="search-options-row">
          <label class="web-search-label">
            <input type="checkbox" id="cb-web-search">
            <span>🌐 웹 검색</span>
          </label>
          <button id="btn-search-send" class="search-send-btn">전송</button>
        </div>
      </div>
      <div class="search-result-area" id="search-result-area">
        <div class="search-hint">질문하거나 요청하면 AI가 노트와 웹을 검색해 답변합니다.</div>
      </div>
    </aside>

  </div>

  <!-- 상태 바 -->
  <div class="status-bar" id="status-bar">
    <span id="breadcrumb"></span>
  </div>

  <!-- 컨텍스트 메뉴 -->
  <div class="context-menu" id="context-menu" style="display:none">
    <div class="ctx-item" id="ctx-rename">이름 변경</div>
    <div class="ctx-item ctx-danger" id="ctx-delete">삭제</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" id="ctx-add-subsection" style="display:none">📁 하위 폴더 추가</div>
    <div class="ctx-item" id="ctx-add-child" style="display:none">하위 항목 추가</div>
  </div>

  <!-- 인라인 입력 모달 (이름 입력용) -->
  <div class="modal-overlay" id="input-modal" style="display:none">
    <div class="modal-box">
      <div class="modal-title" id="input-modal-title">이름 입력</div>
      <input type="text" id="input-modal-field" class="modal-input" maxlength="100">
      <div class="modal-actions">
        <button class="btn-secondary" id="input-modal-cancel">취소</button>
        <button class="btn-primary" id="input-modal-ok">확인</button>
      </div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div class="modal-overlay" id="settings-modal" style="display:none">
    <div class="modal-box settings-modal-box">
      <div class="modal-title">⚙ 설정</div>

      <!-- 배경 테마 -->
      <div class="settings-section-title">배경 테마</div>
      <div class="theme-grid" id="theme-grid"></div>

      <div class="settings-divider"></div>

      <!-- 강조 색상 -->
      <div class="settings-section-title">강조 색상</div>
      <div class="accent-grid" id="accent-grid"></div>

      <div class="settings-divider"></div>

      <!-- API 키 -->
      <label class="modal-label">Gemini API Key</label>
      <div class="api-key-row">
        <input type="password" id="api-key-input" class="modal-input" placeholder="AIzaSy...">
        <button class="icon-btn-sm" id="btn-toggle-key">👁</button>
      </div>
      <p class="modal-hint">📌 <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>에서 무료 발급</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-settings-cancel">취소</button>
        <button class="btn-secondary" id="btn-test-key">연결 테스트</button>
        <button class="btn-primary" id="btn-save-key">저장</button>
      </div>
      <div id="key-status" class="key-status"></div>
    </div>
  </div>

  <!-- AI 정리 결과 모달 -->
  <div class="modal-overlay" id="organize-modal" style="display:none">
    <div class="modal-box organize-modal-box">
      <div class="modal-title">✨ AI 정리 결과</div>
      <div class="organize-preview" id="organize-preview"></div>
      <div class="organize-loading" id="organize-loading" style="display:none">
        정리 중<span class="loading-dots"><span></span><span></span><span></span></span>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-organize-cancel">취소</button>
        <button class="btn-primary" id="btn-organize-apply" disabled>적용하기</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="settings.js"></script>
  <script src="sidebar.js"></script>
  <script src="editor.js"></script>
  <script src="search.js"></script>
  <script src="app.js"></script>
</body>
</html>
